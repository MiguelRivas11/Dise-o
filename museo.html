<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>05. Gran Museo Virtual | MARG.dev</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        canvas {
            display: block;
        }

        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            text-decoration: none;
            z-index: 10;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 20px;
            font-weight: bold;
            background: rgba(0, 0, 0, 0.8);
            padding: 20px 40px;
            border-radius: 10px;
            pointer-events: none;
            z-index: 100;
            text-align: center;
        }

        #loading span {
            display: block;
            font-size: 14px;
            margin-top: 10px;
            color: #4a90e2;
        }

        #hud {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 20;
            padding: 10px 14px;
            border-radius: 8px;
            color: #f3f4f6;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.2);
            font-size: 13px;
            line-height: 1.4;
        }

        #obra-info {
            position: absolute;
            left: 50%;
            bottom: 24px;
            transform: translateX(-50%);
            z-index: 20;
            min-width: 280px;
            max-width: 560px;
            padding: 12px 16px;
            border-radius: 10px;
            color: #ffffff;
            background: rgba(0, 0, 0, 0.72);
            border: 1px solid rgba(255, 255, 255, 0.18);
            text-align: center;
            display: none;
        }

        #obra-info h3 {
            margin: 0 0 6px;
            font-size: 18px;
            color: #ffe4a3;
        }

        #obra-info p {
            margin: 0;
            font-size: 14px;
            color: #d1d5db;
        }

        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 15;
            width: 10px;
            height: 10px;
            border: 2px solid rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            pointer-events: none;
        }
    </style>
</head>

<body>
    <a href="index.html" class="back-btn">← Volver al Portafolio</a>
    <div id="loading">
        Cargando galeria 3D...
        <span id="carga-progreso">Cargando: 0 / 11 archivos</span>
    </div>
    <div id="hud">Click en la escena para capturar mouse<br>W A S D para caminar</div>
    <div id="crosshair"></div>
    <div id="obra-info">
        <h3 id="obra-titulo"></h3>
        <p id="obra-desc"></p>
    </div>
    
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.module.js",
            "pointerlock": "https://cdn.jsdelivr.net/npm/three@0.158.0/examples/jsm/controls/PointerLockControls.js",
            "gltf": "https://cdn.jsdelivr.net/npm/three@0.158.0/examples/jsm/loaders/GLTFLoader.js",
            "fontloader": "https://cdn.jsdelivr.net/npm/three@0.158.0/examples/jsm/loaders/FontLoader.js",
            "textgeometry": "https://cdn.jsdelivr.net/npm/three@0.158.0/examples/jsm/geometries/TextGeometry.js"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'pointerlock';
        import { GLTFLoader } from 'gltf';
        import { FontLoader } from 'fontloader';
        import { TextGeometry } from 'textgeometry';

        const escena = new THREE.Scene();
        escena.background = new THREE.Color(0xf3eee4);
        escena.fog = new THREE.Fog(0xf0eadf, 24, 120);

        const camara = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 120);
        camara.position.set(0, 1.7, 12);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.outputColorSpace = THREE.SRGBColorSpace;
        document.body.appendChild(renderer.domElement);

        const controlesFPS = new PointerLockControls(camara, document.body);
        escena.add(controlesFPS.getObject());

        renderer.domElement.addEventListener('click', () => {
            controlesFPS.lock();
        });

        const hud = document.getElementById('hud');
        controlesFPS.addEventListener('lock', () => {
            if (hud) hud.textContent = 'Recorrido activo - ESC para liberar mouse';
            iniciarAudio();
        });
        controlesFPS.addEventListener('unlock', () => {
            if (hud) hud.innerHTML = 'Click en la escena para capturar mouse<br>W A S D para caminar';
            activarPasos(false);
        });

        const materialPared = new THREE.MeshStandardMaterial({ color: 0xe8ddca, roughness: 0.9, metalness: 0.03 });
        const materialPiso = new THREE.MeshStandardMaterial({ color: 0xd5c7b0, roughness: 0.78, metalness: 0.04 });
        const materialAlfombra = new THREE.MeshStandardMaterial({ color: 0xa11324, roughness: 0.85, metalness: 0.02 });

        const piso = new THREE.Mesh(new THREE.PlaneGeometry(26, 82), materialPiso);
        piso.rotation.x = -Math.PI / 2;
        piso.receiveShadow = true;
        escena.add(piso);

        const alfombra = new THREE.Mesh(new THREE.PlaneGeometry(3.4, 72), materialAlfombra);
        alfombra.rotation.x = -Math.PI / 2;
        alfombra.position.y = 0.01;
        alfombra.position.z = -20;
        alfombra.receiveShadow = true;
        escena.add(alfombra);

        const paredIzquierda = new THREE.Mesh(new THREE.PlaneGeometry(82, 8), materialPared);
        paredIzquierda.position.set(-12.8, 4, -20);
        paredIzquierda.rotation.y = Math.PI / 2;
        escena.add(paredIzquierda);

        const paredDerecha = new THREE.Mesh(new THREE.PlaneGeometry(82, 8), materialPared);
        paredDerecha.position.set(12.8, 4, -20);
        paredDerecha.rotation.y = -Math.PI / 2;
        escena.add(paredDerecha);

        const paredFondo = new THREE.Mesh(new THREE.PlaneGeometry(26, 8), materialPared);
        paredFondo.position.set(0, 4, -61);
        escena.add(paredFondo);

        const paredEntrada = new THREE.Mesh(new THREE.PlaneGeometry(26, 8), materialPared);
        paredEntrada.position.set(0, 4, 21);
        paredEntrada.rotation.y = Math.PI;
        escena.add(paredEntrada);

        const techo = new THREE.Mesh(
            new THREE.PlaneGeometry(26, 82),
            new THREE.MeshStandardMaterial({ color: 0xf3ecde, roughness: 0.92, side: THREE.DoubleSide })
        );
        techo.rotation.x = Math.PI / 2;
        techo.position.set(0, 7.8, -20);
        escena.add(techo);

        const luzAmbiente = new THREE.AmbientLight(0xfff7ed, 0.75);
        escena.add(luzAmbiente);

        const luzHemisferica = new THREE.HemisphereLight(0xfff8ef, 0xd7c3a6, 0.55);
        escena.add(luzHemisferica);

        const luzPrincipal = new THREE.DirectionalLight(0xfff2df, 0.95);
        luzPrincipal.position.set(0, 14, 10);
        luzPrincipal.castShadow = true;
        luzPrincipal.shadow.mapSize.width = 2048;
        luzPrincipal.shadow.mapSize.height = 2048;
        escena.add(luzPrincipal);

        for (let i = 0; i < 7; i++) {
            const z = 10 - i * 10;
            const techoSpot = new THREE.SpotLight(0xfff3dc, 11, 34, Math.PI / 7, 0.55);
            techoSpot.position.set(0, 6.5, z);
            techoSpot.target.position.set(0, 0, z);
            escena.add(techoSpot.target);
            escena.add(techoSpot);
        }

        function crearColumnaRomana(x, z) {
            const materialColumna = new THREE.MeshStandardMaterial({ color: 0xf4ead7, roughness: 0.86, metalness: 0.03 });

            const base = new THREE.Mesh(new THREE.CylinderGeometry(0.52, 0.58, 0.28, 24), materialColumna);
            base.position.set(x, 0.14, z);
            base.receiveShadow = true;
            escena.add(base);

            const fuste = new THREE.Mesh(new THREE.CylinderGeometry(0.34, 0.36, 5.7, 24), materialColumna);
            fuste.position.set(x, 3.05, z);
            fuste.castShadow = true;
            fuste.receiveShadow = true;
            escena.add(fuste);

            const capitel = new THREE.Mesh(new THREE.CylinderGeometry(0.56, 0.42, 0.35, 24), materialColumna);
            capitel.position.set(x, 6.05, z);
            capitel.castShadow = true;
            capitel.receiveShadow = true;
            escena.add(capitel);
        }

        for (let z = 12; z >= -52; z -= 8) {
            crearColumnaRomana(-10.9, z);
            crearColumnaRomana(10.9, z);
        }

        function crearPedestal(x, z) {
            const geo = new THREE.BoxGeometry(1.2, 1, 1.2);
            const mat = new THREE.MeshStandardMaterial({ color: 0xefe6d6, roughness: 0.83, metalness: 0.05 });
            const pedestal = new THREE.Mesh(geo, mat);
            pedestal.position.set(x, 0.5, z);
            pedestal.castShadow = true;
            pedestal.receiveShadow = true;
            escena.add(pedestal);

            const anilloLed = new THREE.Mesh(
                new THREE.TorusGeometry(0.68, 0.03, 10, 36),
                new THREE.MeshStandardMaterial({
                    color: 0x4eb6ff,
                    emissive: 0x2a9dff,
                    emissiveIntensity: 1.35,
                    roughness: 0.25,
                    metalness: 0.15
                })
            );
            anilloLed.rotation.x = Math.PI / 2;
            anilloLed.position.set(x, 1.02, z);
            escena.add(anilloLed);

            const offsetX = x < 0 ? 0.61 : -0.61;
            const tiraLed = new THREE.Mesh(
                new THREE.BoxGeometry(0.04, 0.08, 0.52),
                new THREE.MeshStandardMaterial({
                    color: 0x9fd7ff,
                    emissive: 0x3fa7ff,
                    emissiveIntensity: 1.25,
                    roughness: 0.2,
                    metalness: 0.1
                })
            );
            tiraLed.position.set(x + offsetX, 0.62, z);
            escena.add(tiraLed);

            const luzLed = new THREE.PointLight(0x3fa7ff, 1.2, 4.5, 2);
            luzLed.position.set(x + (x < 0 ? 0.35 : -0.35), 1.1, z);
            escena.add(luzLed);
        }

        const datosObras = [
            { url: './models/AntiqueCamera.glb', x: -5.2, z: 6, escala: 0.3, yOffset: 1.0, titulo: 'Camara Pionera', desc: 'Inicio de la fotografia moderna.' },
            { url: './models/DamagedHelmet.glb', x: 5.2, z: 6, escala: 0.8, yOffset: 1.5, titulo: 'Casco Danado', desc: 'Pieza de ciencia ficcion y desgaste.' },
            { url: './models/FlightHelmet.glb', x: -5.2, z: -2, escala: 2.5, yOffset: 1.0, titulo: 'Casco Aviador', desc: 'Ingenieria y historia en una reliquia.' },
            { url: './models/BoomBox.glb', x: 5.2, z: -2, escala: 50.0, yOffset: 1.0, titulo: 'BoomBox Vintage', desc: 'Icono cultural de los ochenta.' },
            { url: './models/Duck.glb', x: -5.2, z: -10, escala: 1.0, yOffset: 1.0, titulo: 'Pato de Goma', desc: 'Objeto simple convertido en arte pop.' },
            { url: './models/WaterBottle.glb', x: 5.2, z: -10, escala: 5.0, yOffset: 1.0, titulo: 'Botella PBR', desc: 'Reflexion y refraccion realista.' },
            { url: './models/Corset.glb', x: -5.2, z: -18, escala: 20.0, yOffset: 1.0, titulo: 'Corse Historico', desc: 'Moda y estructura de otra epoca.' },
            { url: './models/Fox.glb', x: 5.2, z: -18, escala: 0.02, yOffset: 1.0, titulo: 'Zorro Digital', desc: 'Figura estilizada en baja densidad.' },
            { url: './models/Lantern.glb', x: -5.2, z: -26, escala: 0.08, yOffset: 1.0, titulo: 'Farol de Hierro', desc: 'Luz urbana antes de la electricidad.' },
            { url: './models/Avocado.glb', x: 5.2, z: -26, escala: 15.0, yOffset: 1.0, titulo: 'Aguacate Perfecto', desc: 'Practica de material fotorrealista.' }
        ];

        const obras = [];
        const loader = new GLTFLoader();
        const fontLoader = new FontLoader();
        let loadedFont = null;
        let currentTextMesh = null;

        let archivosCargados = 0;
        const totalArchivos = datosObras.length + 1; 

        const textoProgreso = document.getElementById('carga-progreso');
        const obraInfo = document.getElementById('obra-info');
        const obraTitulo = document.getElementById('obra-titulo');
        const obraDesc = document.getElementById('obra-desc');
        const alturaPedestal = 1.0;
        const separacionModeloPedestal = 0.03;

        const obstaculos = datosObras.map((obra) => ({ x: obra.x, z: obra.z, radio: 1.5 }));
        const jugadorRadio = 0.45;
        const limites = {
            minX: -12.1 + jugadorRadio,
            maxX: 12.1 - jugadorRadio,
            minZ: -60 + jugadorRadio,
            maxZ: 20 - jugadorRadio
        };

        let audioContext = null;
        let ambienteGain = null;
        let pasosGain = null;
        let pasosTimer = 0;

        function verificarCarga(nombreArchivo) {
            archivosCargados++;
            console.log(` Cargado: ${nombreArchivo} (${archivosCargados}/${totalArchivos})`);
            if (textoProgreso) {
                textoProgreso.innerText = `Cargando: ${archivosCargados} / ${totalArchivos} archivos`;
            }

            if (archivosCargados >= totalArchivos && loadedFont) {
                console.log(" Galería completa.");
                const loadingEl = document.getElementById('loading');
                if (loadingEl) {
                    loadingEl.style.display = 'none';
                }
            }
        }

        fontLoader.load(
            'https://unpkg.com/three@0.158.0/examples/fonts/helvetiker_regular.typeface.json',
            (font) => {
                loadedFont = font;
                verificarCarga("Fuente de Texto");
            }
        );

        function crearTexto3D(obra) {
            if (currentTextMesh) {
                currentTextMesh.geometry.dispose();
                currentTextMesh.material.dispose();
                escena.remove(currentTextMesh);
            }

            if (!loadedFont) return;

            const textGeometry = new TextGeometry(
                `${obra.titulo}\n\n${obra.desc}`,
                {
                    font: loadedFont, size: 0.25, height: 0.05,
                    curveSegments: 12, bevelEnabled: true,
                    bevelThickness: 0.01, bevelSize: 0.01, bevelSegments: 3
                }
            );

            textGeometry.computeBoundingBox();
            textGeometry.center();

            const textMaterial = new THREE.MeshStandardMaterial({
                color: 0xffffff, metalness: 0.1, roughness: 0.3,
                emissive: 0xffffff, emissiveIntensity: 0.6
            });

            currentTextMesh = new THREE.Mesh(textGeometry, textMaterial);
            currentTextMesh.position.set(0, 3.1, obra.modeloRef.position.z);
            escena.add(currentTextMesh);
        }

        datosObras.forEach((dato, index) => {
            crearPedestal(dato.x, dato.z);

            loader.load(dato.url, (gltf) => {
                const modelo = gltf.scene;
                modelo.position.set(dato.x, 0, dato.z);
                modelo.scale.set(dato.escala, dato.escala, dato.escala);

                let meshes = [];
                modelo.traverse((child) => { if (child.isMesh) { child.castShadow = true; meshes.push(child); } });

                const bbox = new THREE.Box3().setFromObject(modelo);
                const minY = bbox.min.y;
                const ajusteY = (alturaPedestal + separacionModeloPedestal) - minY;
                modelo.position.y += ajusteY;

                escena.add(modelo);

                obras.push({
                    modeloRef: modelo,
                    meshes: meshes,
                    titulo: dato.titulo,
                    desc: dato.desc,
                    escalaOriginal: { x: dato.escala, y: dato.escala, z: dato.escala },
                    rotacionOriginalY: modelo.rotation.y,
                    centro: new THREE.Vector3(dato.x, alturaPedestal + 0.6, dato.z)
                });

                verificarCarga(`Obra ${index + 1}: ${dato.titulo}`);
            }, undefined, (error) => {
                console.error(` ERROR cargando ${dato.titulo}:`, error);
                verificarCarga(`Fallo ${dato.titulo}`);
            });
        });

        const teclas = { KeyW: false, KeyA: false, KeyS: false, KeyD: false };
        let sprintActivo = false;
        let obraActiva = null;
        let obraTextoActiva = null;

        document.addEventListener('keydown', (e) => {
            if (Object.prototype.hasOwnProperty.call(teclas, e.code)) {
                teclas[e.code] = true;
            }
            if (e.code === 'ShiftLeft' || e.code === 'ShiftRight') {
                sprintActivo = true;
            }
        });

        document.addEventListener('keyup', (e) => {
            if (Object.prototype.hasOwnProperty.call(teclas, e.code)) {
                teclas[e.code] = false;
            }
            if (e.code === 'ShiftLeft' || e.code === 'ShiftRight') {
                sprintActivo = false;
            }
        });

        const reloj = new THREE.Clock();

        function iniciarAudio() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();

                ambienteGain = audioContext.createGain();
                ambienteGain.gain.value = 0.03;
                ambienteGain.connect(audioContext.destination);

                const ambienteOsc = audioContext.createOscillator();
                ambienteOsc.type = 'triangle';
                ambienteOsc.frequency.value = 66;
                ambienteOsc.connect(ambienteGain);
                ambienteOsc.start();

                pasosGain = audioContext.createGain();
                pasosGain.gain.value = 0;
                pasosGain.connect(audioContext.destination);
            }

            if (audioContext.state === 'suspended') {
                audioContext.resume();
            }
        }

        function activarPasos(activo) {
            if (!audioContext || !pasosGain) return;
            const tiempo = audioContext.currentTime;
            pasosGain.gain.cancelScheduledValues(tiempo);
            pasosGain.gain.linearRampToValueAtTime(activo ? 0.06 : 0, tiempo + 0.08);
        }

        function reproducirPaso() {
            if (!audioContext || !pasosGain) return;
            const ruido = audioContext.createBufferSource();
            const buffer = audioContext.createBuffer(1, audioContext.sampleRate * 0.06, audioContext.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < data.length; i++) {
                data[i] = (Math.random() * 2 - 1) * (1 - i / data.length);
            }

            const filtro = audioContext.createBiquadFilter();
            filtro.type = 'lowpass';
            filtro.frequency.value = 450;

            ruido.buffer = buffer;
            ruido.connect(filtro);
            filtro.connect(pasosGain);
            ruido.start();
        }

        function colisionaConObstaculo(x, z) {
            if (x < limites.minX || x > limites.maxX || z < limites.minZ || z > limites.maxZ) {
                return true;
            }

            return obstaculos.some((obs) => {
                const dx = x - obs.x;
                const dz = z - obs.z;
                const distancia = Math.hypot(dx, dz);
                return distancia < (obs.radio + jugadorRadio);
            });
        }

        function limitarJugador() {
            const posicion = controlesFPS.getObject().position;
            posicion.x = THREE.MathUtils.clamp(posicion.x, limites.minX, limites.maxX);
            posicion.z = THREE.MathUtils.clamp(posicion.z, limites.minZ, limites.maxZ);
            posicion.y = 1.7;
        }

        function moverJugador(delta) {
            const velocidadBase = 5.2;
            const multiplicadorSprint = sprintActivo ? 1.75 : 1;
            const velocidad = velocidadBase * multiplicadorSprint;
            const avance = (teclas.KeyW ? 1 : 0) - (teclas.KeyS ? 1 : 0);
            const lateral = (teclas.KeyD ? 1 : 0) - (teclas.KeyA ? 1 : 0);
            const enMovimiento = (avance !== 0 || lateral !== 0) && controlesFPS.isLocked;

            activarPasos(enMovimiento);
            if (enMovimiento && audioContext) {
                pasosTimer -= delta;
                const intervalo = sprintActivo ? 0.2 : 0.34;
                if (pasosTimer <= 0) {
                    reproducirPaso();
                    pasosTimer = intervalo;
                }
            }

            if (avance === 0 && lateral === 0) {
                limitarJugador();
                return;
            }

            const direccionFrontal = new THREE.Vector3();
            camara.getWorldDirection(direccionFrontal);
            direccionFrontal.y = 0;
            direccionFrontal.normalize();

            const direccionLateral = new THREE.Vector3().crossVectors(direccionFrontal, new THREE.Vector3(0, 1, 0)).normalize();
            const movimiento = new THREE.Vector3();
            movimiento.addScaledVector(direccionFrontal, avance);
            movimiento.addScaledVector(direccionLateral, lateral);

            if (movimiento.lengthSq() > 0) {
                movimiento.normalize().multiplyScalar(velocidad * delta);
            }

            const objetoJugador = controlesFPS.getObject();
            const origen = objetoJugador.position.clone();
            const destino = origen.clone().add(movimiento);

            if (!colisionaConObstaculo(destino.x, destino.z)) {
                objetoJugador.position.copy(destino);
            } else {
                const slideX = new THREE.Vector3(origen.x + movimiento.x, origen.y, origen.z);
                const slideZ = new THREE.Vector3(origen.x, origen.y, origen.z + movimiento.z);

                if (!colisionaConObstaculo(slideX.x, slideX.z)) {
                    objetoJugador.position.copy(slideX);
                }
                if (!colisionaConObstaculo(slideZ.x, slideZ.z)) {
                    objetoJugador.position.copy(slideZ);
                }
            }

            limitarJugador();
        }

        function actualizarProximidad() {
            const posicionCamara = controlesFPS.getObject().position;
            let masCercana = null;
            let distanciaMinima = Infinity;

            obras.forEach((obra) => {
                const distancia = posicionCamara.distanceTo(obra.centro);
                if (distancia < distanciaMinima) {
                    distanciaMinima = distancia;
                    masCercana = obra;
                }
            });

            if (masCercana && distanciaMinima < 3.4) {
                if (obraActiva !== masCercana) {
                    obraActiva = masCercana;
                    if (obraInfo && obraTitulo && obraDesc) {
                        obraTitulo.textContent = masCercana.titulo;
                        obraDesc.textContent = masCercana.desc;
                        obraInfo.style.display = 'block';
                    }
                }

                if (obraTextoActiva !== masCercana) {
                    obraTextoActiva = masCercana;
                    crearTexto3D(masCercana);
                }
            } else {
                obraActiva = null;
                obraTextoActiva = null;
                if (obraInfo) {
                    obraInfo.style.display = 'none';
                }
                if (currentTextMesh) {
                    currentTextMesh.geometry.dispose();
                    currentTextMesh.material.dispose();
                    escena.remove(currentTextMesh);
                    currentTextMesh = null;
                }
            }
        }

        function animar() {
            requestAnimationFrame(animar);
            const delta = reloj.getDelta();
            moverJugador(delta);
            actualizarProximidad();

            obras.forEach(obra => {
                const estaCerca = obra === obraActiva;
                
                if (estaCerca) {
                    const escalaHover = obra.escalaOriginal.x * 1.2;
                    obra.modeloRef.scale.set(
                        THREE.MathUtils.lerp(obra.modeloRef.scale.x, escalaHover, 0.1),
                        THREE.MathUtils.lerp(obra.modeloRef.scale.y, escalaHover, 0.1),
                        THREE.MathUtils.lerp(obra.modeloRef.scale.z, escalaHover, 0.1)
                    );
                    obra.modeloRef.rotation.y += 0.045;
                    
                } else {
                    obra.modeloRef.scale.set(
                        THREE.MathUtils.lerp(obra.modeloRef.scale.x, obra.escalaOriginal.x, 0.1),
                        THREE.MathUtils.lerp(obra.modeloRef.scale.y, obra.escalaOriginal.y, 0.1),
                        THREE.MathUtils.lerp(obra.modeloRef.scale.z, obra.escalaOriginal.z, 0.1)
                    );
                    obra.modeloRef.rotation.y += 0.003;
                }
            });

            renderer.render(escena, camara);
        }

        animar();

        window.addEventListener('resize', () => {
            camara.aspect = window.innerWidth / window.innerHeight;
            camara.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>

</html>
