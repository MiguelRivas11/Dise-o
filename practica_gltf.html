<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carga de Modelos GLTF | Miguel Rivas</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #0f172a;
        }

        canvas {
            display: block;
        }

        .back-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            background: rgba(59, 130, 246, 0.8);
            color: white;
            border-radius: 8px;
            text-decoration: none;
            font-family: sans-serif;
            z-index: 10;
        }
    </style>
</head>

<body>
    <a href="index.html" class="back-btn">← Volver al Portafolio</a>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
            "three/examples/jsm/controls/OrbitControls": "https://unpkg.com/three@0.128.0/examples/jsm/controls/OrbitControls.js",
            "three/examples/jsm/loaders/GLTFLoader": "https://unpkg.com/three@0.128.0/examples/jsm/loaders/GLTFLoader.js"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/examples/jsm/controls/OrbitControls';
        import { GLTFLoader } from 'three/examples/jsm/loaders/GLTFLoader';

        // 1. ESCENA Y CÁMARA
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0f172a);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 2, 5); // Acercamos un poco la cámara

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);

        // Configuraciones de color para glTF
        renderer.outputEncoding = THREE.sRGBEncoding;
        renderer.physicallyCorrectLights = true;
        document.body.appendChild(renderer.domElement);

        // 2. LUCES
        const ambient = new THREE.AmbientLight(0xffffff, 1.5); // Luz más fuerte para ver las texturas
        scene.add(ambient);

        const sun = new THREE.DirectionalLight(0xffffff, 2);
        sun.position.set(5, 10, 7);
        scene.add(sun);

        // 3. CARGA DEL MODELO
        const loader = new GLTFLoader();
        const loadedModels = [];

        // Configuración apuntando a tu AnimatedCube
        const configModels = [
            { path: './models/AnimatedCube.gltf', x: -2, scale: 1.5 },
            { path: './models/AnimatedTriangle.gltf', x: 2, scale: 1.5 } // <-- Tu nuevo modelo
        ];

        configModels.forEach(data => {
            loader.load(data.path, (gltf) => {
                const model = gltf.scene;

                model.position.x = data.x;
                model.scale.set(data.scale, data.scale, data.scale);

                // --- TRAVERSE: Aquí es donde modificamos las propiedades internas ---
                model.traverse((child) => {
                    if (child.isMesh) {
                        // Clonamos el material para personalizarlo sin romper el original
                        child.material = child.material.clone();

                        // Según tu archivo, este cubo no es metálico y es muy pulido (brillante)
                        child.material.metalness = 0.0;
                        child.material.roughness = 0.079;

                        // Activamos sombras para mayor realismo
                        child.castShadow = true;
                        child.receiveShadow = true;
                    }
                });

                scene.add(model);
                loadedModels.push(model);
                console.log("Cubo cargado con éxito");
            },
                undefined,
                (error) => console.error("Error cargando el modelo:", error));
        });

        // 4. CONTROLES Y ANIMACIÓN
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        function animate() {
            requestAnimationFrame(animate);
            controls.update();

            // Rotación manual (independiente de la animación interna del archivo)
            loadedModels.forEach(m => {
                m.rotation.y += 0.005;
            });

            renderer.render(scene, camera);
        }
        animate();

        // 5. RESPONSIVIDAD
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>

</html>
