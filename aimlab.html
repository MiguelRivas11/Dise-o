<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AimLab - FPS Educativo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            overflow: hidden;
            background: #000;
        }

        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #ffffff;
            font-size: 24px;
            font-weight: bold;
            font-family: 'Courier New', monospace;
            z-index: 10;
            background: rgba(0,0,0,0.9);
            padding: 15px;
            border-radius: 5px;
            border: 2px solid #ffffff;
        }

        #score {
            margin-bottom: 10px;
            font-size: 24px;
            color: #00ff00;
        }

        #accuracy {
            font-size: 18px;
            color: #00ff00;
        }

        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 30px;
            height: 30px;
            border: 2px solid #ff0000;
            border-radius: 50%;
            z-index: 5;
            box-shadow: 0 0 15px #ff0000;
        }

        #crosshair::before,
        #crosshair::after {
            content: '';
            position: absolute;
            background: #ff0000;
        }

        #crosshair::before {
            width: 2px;
            height: 15px;
            left: 50%;
            transform: translateX(-50%);
            top: -20px;
        }

        #crosshair::after {
            width: 2px;
            height: 15px;
            left: 50%;
            transform: translateX(-50%);
            bottom: -20px;
        }

        #ammo-count {
            position: absolute;
            top: 20px;
            right: 20px;
            color: #ffffff;
            font-size: 24px;
            font-weight: bold;
            font-family: 'Courier New', monospace;
            background: rgba(0,0,0,0.9);
            padding: 15px;
            border-radius: 5px;
            border: 2px solid #ffffff;
        }

        #info {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: #000000;
            font-size: 14px;
            font-weight: bold;
            font-family: 'Courier New', monospace;
            opacity: 0.8;
            background: rgba(255, 255, 255, 0.8);
            padding: 10px;
            border-radius: 5px;
            border: 2px solid #000;
        }

        .bullet-trail {
            position: absolute;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="hud">
        <div>SCORE: <span id="score">0</span></div>
        <div>PRECISIÓN: <span id="accuracy">0</span>%</div>
    </div>
    <div id="crosshair"></div>
    <div id="ammo-count">MUNICIÓN: <span id="ammo">300</span>/300</div>
    <div id="info">
        WASD: Mover | SPACE: Saltar | MOUSE: Mirar<br>
        CLICK: Disparar | R: Recargar | ESC: Desbloquear Ratón
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, gunCtx;
        let targets = [];
        let bullets = [];
        let score = 0;
        let shots = 0;
        let hits = 0;
        let ammo = 300;
        let canShoot = true;
        let recoilAmount = 0;
        let audioContext;

        const keys = {};
        let isLocked = false;
        let yaw = 0, pitch = 0;
        let isJumping = false;
        let velocityY = 0;

        // Dibujar arma y manos en 2D


        // Crear bala visible
        function createBullet(startPos, direction) {
            const bulletGeom = new THREE.SphereGeometry(0.15, 8, 8);
            const bulletMat = new THREE.MeshBasicMaterial({
                color: 0xffff00,
                emissive: 0xffaa00
            });
            const bullet = new THREE.Mesh(bulletGeom, bulletMat);
            bullet.position.copy(startPos);

            // Crear estela (trail)
            const trailGeom = new THREE.BufferGeometry();
            const trailPoints = [startPos.clone(), startPos.clone()];
            trailGeom.setAttribute('position', new THREE.BufferAttribute(new Float32Array(trailPoints.flatMap(p => [p.x, p.y, p.z])), 3));
            const trailMat = new THREE.LineBasicMaterial({ color: 0xffff00, linewidth: 3 });
            const trail = new THREE.Line(trailGeom, trailMat);

            bullet.userData = {
                direction: direction.normalize(),
                speed: 5,
                trail: trail,
                trailPoints: trailPoints,
                maxTrailLength: 30
            };

            scene.add(bullet);
            scene.add(trail);
            bullets.push(bullet);

            return bullet;
        }

        // Animar balas
        function updateBullets() {
            for (let i = bullets.length - 1; i >= 0; i--) {
                const bullet = bullets[i];
                const data = bullet.userData;

                // Mover bala
                bullet.position.addScaledVector(data.direction, data.speed);

                // Actualizar estela
                const newPoint = bullet.position.clone();
                data.trailPoints.push(newPoint);
                if (data.trailPoints.length > data.maxTrailLength) {
                    data.trailPoints.shift();
                }

                // Actualizar geometría del trail
                const positions = new Float32Array(data.trailPoints.flatMap(p => [p.x, p.y, p.z]));
                data.trail.geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));

                // Detectar colisión con objetivos
                let hit = false;
                for (let j = 0; j < targets.length; j++) {
                    const target = targets[j];
                    const distance = bullet.position.distanceTo(target.position);
                    if (distance < 2) {
                        hits++;
                        score += 100;
                        scene.remove(target);
                        targets.splice(j, 1);
                        hit = true;
                        createExplosion(target.position);
                        break;
                    }
                }

                // Remover bala si salió del mapa o golpeó
                if (hit || bullet.position.length() > 500) {
                    scene.remove(bullet);
                    scene.remove(data.trail);
                    bullets.splice(i, 1);
                }
            }
        }

        function createExplosion(pos) {
            const particles = 15;
            for (let i = 0; i < particles; i++) {
                const geom = new THREE.SphereGeometry(0.3, 4, 4);
                const mat = new THREE.MeshBasicMaterial({
                    color: new THREE.Color().setHSL(0.05, 1, 0.5 + Math.random() * 0.3)
                });
                const particle = new THREE.Mesh(geom, mat);
                particle.position.copy(pos);

                const vx = (Math.random() - 0.5) * 8;
                const vy = (Math.random() - 0.5) * 8;
                const vz = (Math.random() - 0.5) * 8;

                particle.userData = { vx, vy, vz, life: 1 };
                scene.add(particle);

                const interval = setInterval(() => {
                    particle.position.x += particle.userData.vx * 0.05;
                    particle.position.y += particle.userData.vy * 0.05;
                    particle.position.z += particle.userData.vz * 0.05;

                    particle.userData.life -= 0.02;
                    mat.opacity = particle.userData.life;

                    if (particle.userData.life <= 0) {
                        clearInterval(interval);
                        scene.remove(particle);
                    }
                }, 16);
            }
        }

        function init() {
            const canvas = document.createElement('canvas');
            document.body.appendChild(canvas);

            renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setClearColor(0x1a3a5a);
            renderer.shadowMap.enabled = true;

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 1.6, 0);

            scene = new THREE.Scene();
            scene.fog = new THREE.Fog(0x1a3a5a, 300, 600);

            // Luces
            const ambientLight = new THREE.AmbientLight(0xffffff, 1);
            scene.add(ambientLight);

            const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
            directionalLight.position.set(100, 100, 50);
            directionalLight.castShadow = true;
            scene.add(directionalLight);

            // Piso
            const floorGeom = new THREE.PlaneGeometry(600, 600);
            const floorMat = new THREE.MeshStandardMaterial({
                color: 0x4a7f9f,
                roughness: 0.7
            });
            const floor = new THREE.Mesh(floorGeom, floorMat);
            floor.rotation.x = -Math.PI / 2;
            scene.add(floor);

            // Paredes
            const wallMat = new THREE.MeshStandardMaterial({
                color: 0x2a4a6f,
                roughness: 0.8
            });

            const backWall = new THREE.Mesh(new THREE.PlaneGeometry(600, 250), wallMat);
            backWall.position.z = -300;
            scene.add(backWall);

            const leftWall = new THREE.Mesh(new THREE.PlaneGeometry(600, 250), wallMat);
            leftWall.rotation.y = Math.PI / 2;
            leftWall.position.x = -300;
            scene.add(leftWall);

            const rightWall = new THREE.Mesh(new THREE.PlaneGeometry(600, 250), wallMat);
            rightWall.rotation.y = -Math.PI / 2;
            rightWall.position.x = 300;
            scene.add(rightWall);

            // Ya no llamamos a createGun() - ahora dibujamos el arma en 2D

            // Event listeners
            document.addEventListener('mousemove', onMouseMove);
            document.addEventListener('click', () => {
                renderer.domElement.requestPointerLock = renderer.domElement.requestPointerLock || renderer.domElement.mozRequestPointerLock;
                renderer.domElement.requestPointerLock();
            });
            document.addEventListener('pointerlockchange', onPointerLockChange);
            document.addEventListener('keydown', onKeyDown);
            document.addEventListener('keyup', onKeyUp);

            animate();
            setInterval(spawnTarget, 1300);
        }

        function onMouseMove(e) {
            if (!isLocked) return;
            yaw -= e.movementX * 0.003;
            pitch -= e.movementY * 0.003;
            pitch = Math.max(-Math.PI / 2, Math.min(Math.PI / 2, pitch));
            camera.quaternion.setFromEuler(new THREE.Euler(pitch, yaw, 0, 'YXZ'));
        }

        function onPointerLockChange() {
            isLocked = document.pointerLockElement === renderer.domElement;
            document.getElementById('info').style.opacity = isLocked ? 0 : 1;
            if (isLocked) document.addEventListener('click', shoot);
            else document.removeEventListener('click', shoot);
        }

        function onKeyDown(e) {
            keys[e.key.toLowerCase()] = true;
            if (e.key === 'Escape') {
                document.exitPointerLock = document.exitPointerLock || document.mozExitPointerLock;
                document.exitPointerLock();
            }
            if (e.key.toLowerCase() === 'r') ammo = 300;
        }

        function onKeyUp(e) {
            keys[e.key.toLowerCase()] = false;
        }

        function updateMovement() {
            const speed = 0.2;
            const sprintSpeed = 0.35;

            const forward = new THREE.Vector3();
            const right = new THREE.Vector3();
            camera.getWorldDirection(forward);
            forward.y = 0;
            forward.normalize();
            right.crossVectors(forward, new THREE.Vector3(0, 1, 0)).normalize();

            const moveSpeed = keys['shift'] ? sprintSpeed : speed;
            if (keys['w']) camera.position.addScaledVector(forward, moveSpeed);
            if (keys['s']) camera.position.addScaledVector(forward, -moveSpeed);
            if (keys['d']) camera.position.addScaledVector(right, moveSpeed);
            if (keys['a']) camera.position.addScaledVector(right, -moveSpeed);

            if (keys[' '] && !isJumping) {
                isJumping = true;
                velocityY = 0.18;
            }

            if (isJumping) {
                camera.position.y += velocityY;
                velocityY -= 0.015;
                if (camera.position.y <= 1.6) {
                    camera.position.y = 1.6;
                    isJumping = false;
                    velocityY = 0;
                }
            }

            camera.position.x = Math.max(-280, Math.min(280, camera.position.x));
            camera.position.z = Math.max(-280, Math.min(280, camera.position.z));
        }

        function shoot() {
            if (!isLocked || !canShoot || ammo <= 0) {
                if (ammo <= 0) {
                    playSound('reload', 0.3);
                }
                return;
            }

            shots++;
            ammo--;
            canShoot = false;
            setTimeout(() => { canShoot = true; }, 80);

            // Retroceso del arma (animación)
            recoilAmount = 1;

            // Crear bala
            const direction = new THREE.Vector3();
            camera.getWorldDirection(direction);
            const bulletPos = camera.position.clone();
            bulletPos.addScaledVector(direction, 1.5);

            createBullet(bulletPos, direction.clone());

            playSound('shoot', 0.4);
            updateUI();
        }

        function spawnTarget() {
            if (targets.length >= 6) return;

            const targetGeom = new THREE.SphereGeometry(1.5, 32, 32);
            const targetMat = new THREE.MeshStandardMaterial({
                color: new THREE.Color().setHSL(Math.random(), 1, 0.6),
                emissive: new THREE.Color().setHSL(Math.random(), 1, 0.3),
                emissiveIntensity: 0.6
            });

            const target = new THREE.Mesh(targetGeom, targetMat);
            target.position.set(
                (Math.random() - 0.5) * 250,
                Math.random() * 50 + 10,
                (Math.random() - 0.5) * 150 - 80
            );

            scene.add(target);
            targets.push(target);

            setTimeout(() => {
                if (targets.includes(target)) {
                    targets.splice(targets.indexOf(target), 1);
                    scene.remove(target);
                }
            }, 8000);
        }

        function updateUI() {
            document.getElementById('score').textContent = score;
            document.getElementById('ammo').textContent = ammo;
            const accuracy = shots > 0 ? Math.round((hits / shots) * 100) : 0;
            document.getElementById('accuracy').textContent = accuracy;
        }

        function animate() {
            requestAnimationFrame(animate);
            updateMovement();
            updateBullets();

            targets.forEach(t => {
                t.rotation.x += 0.01;
                t.rotation.y += 0.015;
            });

            renderer.render(scene, camera);
        }

        function playSound(type, vol = 0.5) {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
            const ctx = audioContext;
            const now = ctx.currentTime;

            if (type === 'shoot') {
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.frequency.setValueAtTime(600, now);
                osc.frequency.exponentialRampToValueAtTime(200, now + 0.1);
                gain.gain.setValueAtTime(vol, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                osc.start(now);
                osc.stop(now + 0.1);
            } else if (type === 'reload') {
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.frequency.setValueAtTime(400, now);
                gain.gain.setValueAtTime(vol, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
                osc.start(now);
                osc.stop(now + 0.2);
            }
        }

        window.addEventListener('load', init);
    </script>
</body>
</html>
